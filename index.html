<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Tablecho — Assistant IA de réputation pour restaurateurs indépendants</title>
    <meta name="description" content="Tablecho automatise vos réponses aux avis clients grâce à l'IA. Humanisé, validé par vous, publié au bon moment. Premier outil dédié aux restaurateurs indépendants." />
    <link rel="canonical" href="https://tablecho.com" />

    <!-- Open Graph -->
    <meta property="og:title" content="Tablecho — Préservez votre réputation en ligne" />
    <meta property="og:description" content="Tablecho automatise vos réponses aux avis clients grâce à l'IA. Humanisé, validé par vous, publié au bon moment." />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:url" content="https://tablecho.com" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tablecho — Préservez votre réputation en ligne" />
    <meta name="twitter:description" content="Tablecho automatise vos réponses aux avis clients grâce à l'IA." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              or: '#C9A84C',
              'or-clair': '#D4A853',
              anthracite: '#1C1C1C',
              'anthracite-moyen': '#2C2C2C',
              creme: '#FAF7F2',
              'vert-succes': '#2D6A4F',
              'rouge-erreur': '#C0392B',
              'gris-texte': '#6B6B6B',
              bordure: '#E8E2D9',
            },
            fontFamily: {
              playfair: ['"Playfair Display"', 'serif'],
              inter: ['Inter', 'sans-serif'],
            },
            keyframes: {
              'scroll-x': {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              },
            },
            animation: {
              'scroll-x': 'scroll-x 30s linear infinite',
            },
          },
        },
      }
    </script>

    <!-- Plausible Analytics (RGPD-friendly) -->
    <script defer data-domain="tablecho.com" src="https://plausible.io/js/script.js"></script>
  </head>
  <body class="font-inter bg-white text-anthracite">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
